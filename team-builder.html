<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pokemon Team Builder</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; line-height: 1.35; }
    header { margin-bottom: 12px; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    input[type="text"] { padding: 8px; min-width: 240px; }
    button { padding: 8px 12px; cursor: pointer; }
    hr { margin: 16px 0; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; max-width: 760px; }
    .grid { display: grid; grid-template-columns: 160px 1fr; gap: 12px; align-items: start; }
    img { max-width: 160px; height: auto; display: block; }
    select { width: 100%; padding: 8px; }
    .muted { color: #666; }
    .error { color: #b00020; }
    .team { display: grid; gap: 10px; max-width: 760px; }
    .team-item { border: 1px solid #eee; border-radius: 10px; padding: 10px; display: grid; grid-template-columns: 72px 1fr; gap: 10px; align-items: start; }
    .team-item img { max-width: 72px; }
    .pill { display: inline-block; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; margin: 2px 4px 0 0; font-size: 12px; }
    .small { font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Pokemon Team Builder</h1>
    <p class="muted">Enter a Pokémon <b>name</b> (e.g., <i>pikachu</i>) or <b>ID</b> (1–151 works great).</p>
  </header>

  <section class="card">
    <div class="row">
      <label for="pokeInput"><b>Pokémon:</b></label>
      <input id="pokeInput" type="text" placeholder="e.g., 25 or pikachu" autocomplete="off" />
      <button id="searchBtn" type="button">Submit</button>
      <span id="status" class="muted small"></span>
    </div>

    <div id="error" class="error" style="margin-top:10px;"></div>

    <hr />

    <div id="result" class="grid" style="display:none;">
      <div>
        <img id="pokeImg" alt="Pokemon image" />
      </div>

      <div>
        <h2 id="pokeName" style="margin: 0 0 6px 0;"></h2>
        <div class="row" style="margin-bottom: 10px;">
          <audio id="pokeAudio" controls preload="none" style="width: 100%; max-width: 360px;"></audio>
          <span id="audioNote" class="muted small"></span>
        </div>

        <div class="row" style="align-items: stretch;">
          <div style="flex: 1; min-width: 220px;">
            <label for="move1"><b>Move 1</b></label>
            <select id="move1"></select>
          </div>
          <div style="flex: 1; min-width: 220px;">
            <label for="move2"><b>Move 2</b></label>
            <select id="move2"></select>
          </div>
        </div>

        <div class="row" style="align-items: stretch; margin-top: 10px;">
          <div style="flex: 1; min-width: 220px;">
            <label for="move3"><b>Move 3</b></label>
            <select id="move3"></select>
          </div>
          <div style="flex: 1; min-width: 220px;">
            <label for="move4"><b>Move 4</b></label>
            <select id="move4"></select>
          </div>
        </div>

        <div class="row" style="margin-top: 12px;">
          <button id="addBtn" type="button" disabled>Add to Team</button>
          <button id="clearTeamBtn" type="button">Clear Team</button>
          <span class="muted small">Team max: 6</span>
        </div>
      </div>
    </div>
  </section>

  <section style="margin-top: 16px;">
    <h2>Your Team</h2>
    <div id="teamList" class="team"></div>
    <p id="teamEmpty" class="muted">No Pokémon added yet.</p>
  </section>

  <script>
    // -----------------------------
    // Simple cache (localStorage + TTL)
    // -----------------------------
    const CACHE_PREFIX = "pokeCache:";
    const CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7 days
    const memCache = new Map();

    function cacheKey(url) {
      return CACHE_PREFIX + url;
    }

    function readCache(url) {
      if (memCache.has(url)) return memCache.get(url);

      const raw = localStorage.getItem(cacheKey(url));
      if (!raw) return null;

      try {
        const obj = JSON.parse(raw);
        if (!obj || typeof obj.t !== "number") return null;
        const age = Date.now() - obj.t;
        if (age > CACHE_TTL_MS) {
          localStorage.removeItem(cacheKey(url));
          return null;
        }
        memCache.set(url, obj.data);
        return obj.data;
      } catch {
        localStorage.removeItem(cacheKey(url));
        return null;
      }
    }

    function writeCache(url, data) {
      memCache.set(url, data);
      localStorage.setItem(cacheKey(url), JSON.stringify({ t: Date.now(), data }));
    }

    async function cachedFetchJson(url) {
      const cached = readCache(url);
      if (cached) return { data: cached, fromCache: true };

      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} (${res.statusText})`);
      const data = await res.json();
      writeCache(url, data);
      return { data, fromCache: false };
    }

    // -----------------------------
    // Team persistence
    // -----------------------------
    const TEAM_KEY = "pokemonTeam";
    function loadTeam() {
      try {
        return JSON.parse(localStorage.getItem(TEAM_KEY)) || [];
      } catch {
        return [];
      }
    }
    function saveTeam(team) {
      localStorage.setItem(TEAM_KEY, JSON.stringify(team));
    }

    // -----------------------------
    // DOM helpers
    // -----------------------------
    const els = {
      input: document.getElementById("pokeInput"),
      searchBtn: document.getElementById("searchBtn"),
      addBtn: document.getElementById("addBtn"),
      clearTeamBtn: document.getElementById("clearTeamBtn"),
      status: document.getElementById("status"),
      error: document.getElementById("error"),

      result: document.getElementById("result"),
      pokeImg: document.getElementById("pokeImg"),
      pokeName: document.getElementById("pokeName"),
      audio: document.getElementById("pokeAudio"),
      audioNote: document.getElementById("audioNote"),

      move1: document.getElementById("move1"),
      move2: document.getElementById("move2"),
      move3: document.getElementById("move3"),
      move4: document.getElementById("move4"),

      teamList: document.getElementById("teamList"),
      teamEmpty: document.getElementById("teamEmpty")
    };

    let currentPokemon = null; // { id, name, spriteUrl, cries: {latest, legacy}, moves: [name...] }

    function setStatus(msg) {
      els.status.textContent = msg || "";
    }
    function setError(msg) {
      els.error.textContent = msg || "";
    }

    function normalizeQuery(q) {
      return (q || "").trim().toLowerCase();
    }

    function fillMoves(selectEl, moves, selectedValue) {
      selectEl.innerHTML = "";

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "-- choose a move --";
      selectEl.appendChild(placeholder);

      for (const m of moves) {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        selectEl.appendChild(opt);
      }

      if (selectedValue && moves.includes(selectedValue)) {
        selectEl.value = selectedValue;
      } else {
        selectEl.value = "";
      }
    }

    function pickSprite(pokeJson) {
      // Prefer "official-artwork", fall back to front_default
      const other = pokeJson?.sprites?.other;
      const official = other?.["official-artwork"]?.front_default;
      return official || pokeJson?.sprites?.front_default || "";
    }

    function pickCry(pokeJson) {
      // PokeAPI includes cries.latest and cries.legacy
      const latest = pokeJson?.cries?.latest || "";
      const legacy = pokeJson?.cries?.legacy || "";
      return { latest, legacy };
    }

    function getMoveNames(pokeJson) {
      // Each entry: { move: { name, url }, version_group_details: [...] }
      const raw = pokeJson?.moves || [];
      const names = raw
        .map(x => x?.move?.name)
        .filter(Boolean);

      // Unique + sort for nicer dropdowns
      return Array.from(new Set(names)).sort((a, b) => a.localeCompare(b));
    }

    function renderCurrentPokemon(p) {
      els.result.style.display = "grid";
      els.pokeName.textContent = `${capitalize(p.name)} (ID: ${p.id})`;

      els.pokeImg.src = p.spriteUrl || "";
      els.pokeImg.alt = `${p.name} image`;

      // Audio (cry)
      const cryUrl = p.cries.latest || p.cries.legacy;
      if (cryUrl) {
        els.audio.src = cryUrl;
        els.audio.load();
        els.audioNote.textContent = p.cries.latest ? "Latest cry loaded." : "Legacy cry loaded.";
      } else {
        els.audio.removeAttribute("src");
        els.audio.load();
        els.audioNote.textContent = "No cry audio available for this Pokémon.";
      }

      // Move dropdowns
      const moves = p.moves;
      fillMoves(els.move1, moves);
      fillMoves(els.move2, moves);
      fillMoves(els.move3, moves);
      fillMoves(els.move4, moves);

      // Enable add button
      els.addBtn.disabled = false;
    }

    function capitalize(s) {
      if (!s) return s;
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function getSelectedMoves() {
      const picks = [els.move1.value, els.move2.value, els.move3.value, els.move4.value]
        .filter(v => v && v.trim().length > 0);

      // You can allow duplicates, but typically you want unique
      return Array.from(new Set(picks));
    }

    function renderTeam() {
      const team = loadTeam();
      els.teamList.innerHTML = "";
      els.teamEmpty.style.display = team.length ? "none" : "block";

      for (let i = 0; i < team.length; i++) {
        const member = team[i];

        const item = document.createElement("div");
        item.className = "team-item";

        const img = document.createElement("img");
        img.src = member.spriteUrl || "";
        img.alt = member.name + " image";

        const info = document.createElement("div");

        const title = document.createElement("div");
        title.innerHTML = `<b>${capitalize(member.name)}</b> <span class="muted small">(ID: ${member.id})</span>`;

        const movesLine = document.createElement("div");
        if (member.moves && member.moves.length) {
          for (const mv of member.moves) {
            const pill = document.createElement("span");
            pill.className = "pill";
            pill.textContent = mv;
            movesLine.appendChild(pill);
          }
        } else {
          movesLine.innerHTML = `<span class="muted">No moves selected.</span>`;
        }

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.textContent = "Remove";
        removeBtn.className = "small";
        removeBtn.addEventListener("click", () => {
          const t = loadTeam();
          t.splice(i, 1);
          saveTeam(t);
          renderTeam();
        });

        info.appendChild(title);
        info.appendChild(movesLine);
        info.appendChild(document.createElement("div")).appendChild(removeBtn);

        item.appendChild(img);
        item.appendChild(info);

        els.teamList.appendChild(item);
      }
    }

    // -----------------------------
    // Events
    // -----------------------------
    async function handleSearch() {
      setError("");
      els.addBtn.disabled = true;
      currentPokemon = null;

      const q = normalizeQuery(els.input.value);
      if (!q) {
        setError("Please enter a Pokémon name or ID.");
        return;
      }

      const url = `https://pokeapi.co/api/v2/pokemon/${encodeURIComponent(q)}/`;

      try {
        setStatus("Loading...");
        const { data, fromCache } = await cachedFetchJson(url);
        setStatus(fromCache ? "Loaded from cache." : "Fetched from API.");

        const p = {
          id: data.id,
          name: data.name,
          spriteUrl: pickSprite(data),
          cries: pickCry(data),
          moves: getMoveNames(data)
        };

        if (!p.spriteUrl) {
          setError("Found Pokémon, but no image URL was available.");
        }
        if (!p.moves.length) {
          setError("Found Pokémon, but no moves were available.");
        }

        currentPokemon = p;
        renderCurrentPokemon(p);

      } catch (err) {
        console.error(err);
        setStatus("");
        els.result.style.display = "none";
        setError("Could not find that Pokémon. Try a valid name (e.g., pikachu) or ID (e.g., 25).");
      }
    }

    function handleAddToTeam() {
      setError("");
      if (!currentPokemon) return;

      const team = loadTeam();
      if (team.length >= 6) {
        setError("Your team already has 6 Pokémon. Remove one before adding another.");
        return;
      }

      const moves = getSelectedMoves();

      // Save current Pokemon + chosen moves
      team.push({
        id: currentPokemon.id,
        name: currentPokemon.name,
        spriteUrl: currentPokemon.spriteUrl,
        moves
      });

      saveTeam(team);
      renderTeam();
      setStatus("Added to team!");
    }

    function handleClearTeam() {
      saveTeam([]);
      renderTeam();
      setStatus("Team cleared.");
      setError("");
    }

    els.searchBtn.addEventListener("click", handleSearch);
    els.input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleSearch();
    });
    els.addBtn.addEventListener("click", handleAddToTeam);
    els.clearTeamBtn.addEventListener("click", handleClearTeam);

    // Initial render
    renderTeam();
  </script>
</body>
</html>
