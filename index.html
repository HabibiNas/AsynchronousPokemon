<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pokemon Team Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main>
    <section class="card">
      <label class="label-top" for="pokeInput">Name or ID</label>

      <div class="row">
        <input id="pokeInput" type="text" placeholder="" autocomplete="off" />
        <button id="searchBtn" type="button">Find</button>
        <span id="status" class="muted small"></span>
      </div>

      <div id="error" class="error"></div>

      <div id="result" class="grid hidden">
        <img id="pokeImg" alt="Pokemon image" />

        <audio id="pokeAudio" controls preload="none"></audio>
        <span id="audioNote" class="muted small"></span>

        <!-- 4 move dropdowns in a 2x2 grid -->
        <div class="moves-grid">
          <select id="move1"></select>
          <select id="move2"></select>
          <select id="move3"></select>
          <select id="move4"></select>
        </div>

        <div class="actions">
          <button id="addBtn" type="button" disabled>Add to Team</button>
          <button id="clearTeamBtn" type="button">Clear Team</button>
        </div>

        <!-- Team table like your screenshot -->
        <section class="team-section">
          <table class="team-table" id="teamTable" style="display:none;"></table>
        </section>

      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
